<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My-Vault</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div id="app">
    <!-- Settings Bar (always visible when unlocked) -->
    <div id="settings-bar" class="settings-bar hidden">
      <div class="settings-left">
        <svg class="brand-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
        <span class="brand-name">My-Vault</span>
      </div>
      <div class="settings-right">
        <button id="btn-lock" class="icon-btn" title="Lock Vault">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
        </button>
        <button id="btn-dashboard" class="icon-btn" title="Open Dashboard">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>
        </button>
      </div>
    </div>

    <!-- Lock Screen -->
    <div id="lock-screen" class="lock-screen">
      <div class="lock-icon-wrap">
        <svg class="lock-hero-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
      </div>
      <h2 class="lock-title">My-Vault</h2>
      <p class="lock-subtitle">Enter master password to unlock</p>
      <div class="lock-input-wrap">
        <input type="password" id="master-password" class="lock-input" placeholder="Master password" autocomplete="off" />
        <button id="btn-toggle-pw" class="pw-toggle" type="button" title="Show password">
          <svg id="eye-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
        </button>
      </div>
      <div id="lock-error" class="lock-error hidden"></div>
      <button id="btn-unlock" class="btn-unlock">Unlock</button>
    </div>

    <!-- Main Vault View (hidden by default) -->
    <div id="vault-view" class="vault-view hidden">
      <!-- Search -->
      <div class="search-wrap">
        <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        <input type="text" id="search-input" class="search-input" placeholder="Search vault…" />
      </div>

      <!-- Loading -->
      <div id="loading-state" class="state-message">
        <div class="spinner"></div>
        <p>Loading your vault…</p>
      </div>

      <!-- Empty -->
      <div id="empty-state" class="state-message hidden">
        <svg class="empty-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/><polyline points="3.27 6.96 12 12.01 20.73 6.96"/><line x1="12" y1="22.08" x2="12" y2="12"/></svg>
        <p>Your vault is empty</p>
        <span class="empty-hint">Add items from websites or your dashboard</span>
      </div>

      <!-- Item List -->
      <div id="item-list" class="item-list hidden"></div>
    </div>
  </div>

  <!-- Toast container -->
  <div id="toast-container" class="toast-container"></div>

  <script src="components/LockScreen.js"></script>
  <script src="components/SearchView.js"></script>
  <script src="components/ItemCard.js"></script>
  <script src="components/ItemList.js"></script>
  <script src="components/GeneratorView.js"></script>
  <script src="components/SettingsBar.js"></script>
  <script src="popup.js"></script>
</body>
</html>
